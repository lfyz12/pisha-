# Shared environment for backend and celery-worker (merged via <<: *backend-env).
x-backend-env: &backend-env
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS must be set}
  POSTGRES_DB: pisha_db
  POSTGRES_USER: pisha
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD must be set}
  FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY must be set}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  SURREALDB_URL: ${SURREALDB_URL:-ws://surrealdb:8000}
  SURREALDB_NS: ${SURREALDB_NS:-pisha}
  SURREALDB_DB: ${SURREALDB_DB:-pisha}
  SURREALDB_USER: ${SURREALDB_USER:-root}
  SURREALDB_PASS: ${SURREALDB_PASSWORD:?SURREALDB_PASSWORD must be set}
  LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://localhost:4000}
  LITELLM_API_KEY: ${LITELLM_API_KEY:-}
  LITELLM_CHAT_MODEL: ${LITELLM_CHAT_MODEL:-gpt-4o-mini}
  LITELLM_EMBEDDING_MODEL: ${LITELLM_EMBEDDING_MODEL:-text-embedding-3-small}
  LITELLM_RERANK_MODEL: ${LITELLM_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
  LITELLM_CLASSIFIER_MODEL: ${LITELLM_CLASSIFIER_MODEL:-}
  MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}

services:
  db:
    image: postgres:16
    container_name: pisha-db
    environment:
      - POSTGRES_DB=pisha_db
      - POSTGRES_USER=pisha
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pisha-postgres-data:/var/lib/postgresql/data
    networks:
      - pisha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pisha -d pisha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pisha-redis
    networks:
      - pisha-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  surrealdb:
    image: surrealdb/surrealdb:v3.2
    container_name: pisha-surrealdb
    # The image runs as a nonroot user, but the named volume /data is created
    # root-owned; run as root so the database can write to it.
    user: root
    command: start --log info --user root --pass ${SURREALDB_PASSWORD:?SURREALDB_PASSWORD must be set} surrealkv:///data
    volumes:
      - surreal-data:/data
    networks:
      - pisha-network
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pisha-backend
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      surrealdb:
        condition: service_healthy
    networks:
      - pisha-network
    volumes:
      - media-data:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_database &&
             python manage.py init_surreal_schema &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --worker-class gthread --threads 8 pisha_backend.wsgi:application"

  celery-worker:
    build: ./backend
    container_name: pisha-celery-worker
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      surrealdb:
        condition: service_healthy
    networks:
      - pisha-network
    volumes:
      - media-data:/app/media
    command: celery -A pisha_backend worker --loglevel=info

  frontend:
    build: ./frontend
    container_name: pisha-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pisha-network

volumes:
  pisha-postgres-data:
  surreal-data:
  media-data:

networks:
  pisha-network:
    driver: bridge

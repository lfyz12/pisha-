services:
  db:
    image: postgres:16
    container_name: pisha-db
    environment:
      - POSTGRES_DB=pisha_db
      - POSTGRES_USER=pisha
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pisha_password}
    volumes:
      - pisha-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pisha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pisha -d pisha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pisha-backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key}
      - DEBUG=False
      - POSTGRES_DB=pisha_db
      - POSTGRES_USER=pisha
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pisha_password}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-1234}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pisha-network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_database &&
             gunicorn --bind 0.0.0.0:8000 pisha_backend.wsgi:application"

  frontend:
    build: ./frontend
    container_name: pisha-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pisha-network

volumes:
  pisha-postgres-data:

networks:
  pisha-network:
    driver: bridge

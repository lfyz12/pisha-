name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Check frontend dependency vulnerabilities
        run: npm audit --prefix frontend --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  backend:
    name: Backend Security & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pisha_db
          POSTGRES_USER: pisha
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pisha -d pisha_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DEBUG: "False"
      SECRET_KEY: ci-secret-key-with-sufficient-length-and-entropy-123456
      FIELD_ENCRYPTION_KEY: 6_B5y1Pa_4O0mRJxhZEO_OqRXsZNxOHDAsACxTrGcI4=
      POSTGRES_DB: pisha_db
      POSTGRES_USER: pisha
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt pip-audit

      - name: Check dependency vulnerabilities
        run: pip-audit -r backend/requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Django deployment check
        working-directory: backend
        run: python manage.py check --deploy

      - name: Backend tests
        working-directory: backend
        run: python manage.py test
